
name: "Vprofile IAC"
on:
  push:
    branches: 
      - main
      - stage
    paths:
      - terraform/**
  pull_request:
    branches: 
      - main
    paths:
      - terraform/**

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  BUCKET_IF_STATE: ${{ secrets.BUCKET_IF_STATE }}
  AWS_REGION: us-east-1
  EKS_CLUSTER: vprofile-eks

jobs:
  terraform:
    name: "Apply Terraform code changes"
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ./terraform
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4
      
      - name: "Setup Terraform with sepcified version"
        uses: hashicorp/setup-terraform@v2
        #with:
        #  terraform_version: 1.6.3

      - name: "Terraform Init"
        id: init
        run: terraform init -backend-config="bucket=${{ env.BUCKET_IF_STATE }}"

      - name: "Terraform format"
        id: fmt
        run: terraform fmt -check

      - name: "Terraform validate"
        id: validate
        run: terraform validate

      - name: "Terraform plan"
        id: plan
        run: terraform plan -no-color -input=false -out planfile
        continue-on-error: true

      - name: "Terraform plan status"
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: "Terraform apply"
        id: apply
        if: github.ref == 'refs/heads/main' && steps.plan.outcome == 'success' && github.event_name == 'push'
        run: terraform apply -input=false -auto-approve -parallelism=1 planfile

      - name: "AWS Configure credentials"
        if: steps.apply.outcome == 'success' && github.ref == 'refs/heads/main' 
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "Get Kube config file"
        id: getkubeconfig
        if: steps.apply.outcome == 'success' && github.ref == 'refs/heads/main' 
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: "Install Ingress Controller"
        if: steps.apply.outcome == 'success' && github.ref == 'refs/heads/main' && steps.getkubeconfig.outcome == 'success'
        run: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.1.3/deploy/static/provider/aws/deploy.yaml
